quarkus.http.port=8088

# Datasource
quarkus.datasource.db-kind=mysql
quarkus.hibernate-orm.schema-management.strategy=none
quarkus.flyway.migrate-at-start=true

# Dev Services auto-starts a MySQL container in dev mode (requires Docker).
# override via environment variables):
quarkus.datasource.jdbc.url=jdbc:mysql://localhost:3307/booklending
quarkus.datasource.username=${MYSQL_USER:booklending}
quarkus.datasource.password=${MYSQL_PASSWORD:booklending}

#  Test profile: H2 in-memory (no Docker required) 
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:testdb;MODE=MYSQL;DB_CLOSE_DELAY=-1
%test.quarkus.flyway.migrate-at-start=false
%test.quarkus.hibernate-orm.schema-management.strategy=drop-and-create

#  Security (embedded users) 
quarkus.security.users.embedded.enabled=true
quarkus.security.users.embedded.plain-text=true
quarkus.security.users.embedded.users.admin=admin123
quarkus.security.users.embedded.roles.admin=admin
quarkus.security.users.embedded.users.alice=alice123
quarkus.security.users.embedded.roles.alice=user
quarkus.security.users.embedded.users.bob=bob123
quarkus.security.users.embedded.roles.bob=user

#  Lending Rules 
lending.max-active-loans=3
lending.max-loan-duration-days=14

#  Observability 
quarkus.log.level=INFO
quarkus.log.category."com.demandlane".level=DEBUG

# OpenAPI / Swagger UI
quarkus.smallrye-openapi.info-title=Book Lending API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=REST API for managing a library book lending system
quarkus.swagger-ui.always-include=true

# metric
quarkus.micrometer.export.prometheus.enabled=true
