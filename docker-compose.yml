services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: booklending
      MYSQL_USER: ${MYSQL_USER:-booklending}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-booklending}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
