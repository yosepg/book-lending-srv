services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: booklending
      MYSQL_USER: ${MYSQL_USER:-booklending}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-booklending}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10

  booklending-app:
    build:
      context: .
      dockerfile: src/main/docker/Dockerfile.jvm
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:mysql://mysql:3306/booklending
      MYSQL_USER: ${MYSQL_USER:-booklending}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-booklending}
    ports:
      - "8088:8088"

volumes:
  mysql_data:
